services:
  python:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: python
    environment:
      - TIMEZONE=${TIMEZONE}
      - COOP_LATITUDE=${COOP_LATITUDE}
      - COOP_LONGITUDE=${COOP_LONGITUDE}
      - OMLET_API_TOKEN=${OMLET_API_TOKEN}
      - OMLET_DEVICE_ID=${OMLET_DEVICE_ID}
    volumes:
      - .:/usr/src/app
    restart: no